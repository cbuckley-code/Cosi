name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'cosi-orchestrator/**'
      - 'cosi-builder/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cosi-orchestrator/**'
      - 'cosi-builder/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cosi-orchestrator/package-lock.json

      - name: Install orchestrator dependencies
        working-directory: cosi-orchestrator
        run: npm install

      - name: Install builder dependencies
        working-directory: cosi-builder
        run: npm install

      - name: Run orchestrator unit tests
        working-directory: cosi-orchestrator
        run: npm run test:unit
        env:
          TOOLS_DIR: /tmp/cosi-test-tools
          SECRETS_PATH: /tmp/cosi-test-secrets.env

      - name: Run orchestrator integration tests
        working-directory: cosi-orchestrator
        run: npm test
        env:
          CI: true
          REDIS_URL: redis://localhost:6399
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          BEDROCK_MODEL_ID: test-model
          TOOLS_DIR: /tmp/cosi-test-tools
          SECRETS_PATH: /tmp/cosi-test-secrets.env

      - name: Run builder unit tests
        working-directory: cosi-builder
        run: npm test
