# Cosi Helm Chart — default values
# Override with: helm install cosi cosi/cosi -f my-values.yaml

# -- Global image settings
global:
  imageRegistry: ""       # e.g. "ghcr.io" — prefixed to all image names
  imagePullSecrets: []    # list of secret names for private registries
  storageClass: ""        # override default StorageClass for PVCs

# -- Namespace to deploy into (leave blank to use the release namespace)
namespaceOverride: ""

# ──────────────────────────────────────────────────────────────────────────────
# Orchestrator
# ──────────────────────────────────────────────────────────────────────────────
orchestrator:
  image:
    repository: ghcr.io/cbuckley-code/cosi-orchestrator
    tag: ""               # defaults to .Chart.appVersion
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3001

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # AWS configuration — set here or use an existing secret (see aws.existingSecret)
  aws:
    region: us-west-2
    secretPrefix: "cosi/"
    govCloud: false
    bedrockModelId: "anthropic.claude-sonnet-4-20250514-v1:0"

  git:
    repoUrl: ""           # required: git repo Cosi commits generated tools to
    branch: main

  session:
    ttlSeconds: 86400
    compactionThreshold: 20

  # Mount the tools directory as a volume (shared with builder via PVC)
  toolsPvc:
    claimName: cosi-tools   # must match builder.toolsPvc.claimName

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Builder sidecar
# ──────────────────────────────────────────────────────────────────────────────
builder:
  image:
    repository: ghcr.io/cbuckley-code/cosi-builder
    tag: ""
    pullPolicy: IfNotPresent

  pollInterval: 5000

  # The builder needs Docker socket access to build tool images.
  # In production clusters consider using kaniko or a dedicated build service.
  dockerSocket:
    hostPath: /var/run/docker.sock

  # Shared PVC for the tools directory (read-write for builder, read-only for orchestrator)
  toolsPvc:
    claimName: cosi-tools
    storageClass: ""      # uses global.storageClass if empty
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  podAnnotations: {}
  # Builder must run privileged to access the Docker socket
  podSecurityContext:
    runAsUser: 0
  securityContext:
    privileged: true
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Nginx + UI
# ──────────────────────────────────────────────────────────────────────────────
nginx:
  image:
    repository: ghcr.io/cbuckley-code/cosi-ui
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 443

  # TLS certificate — provide an existing secret or let Cosi use a self-signed cert
  tls:
    # Name of an existing TLS secret (type: kubernetes.io/tls)
    # If empty, a self-signed cert is generated by an init container
    existingSecret: ""
    # Self-signed cert subject (used only when existingSecret is empty)
    commonName: cosi.local

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Redis
# ──────────────────────────────────────────────────────────────────────────────
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""      # uses global.storageClass if empty

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # redis.conf overrides passed as command args
  maxmemory: 256mb
  maxmemoryPolicy: allkeys-lru

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Ingress
# ──────────────────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: cosi.example.com
  tls:
    enabled: true
    secretName: cosi-ingress-tls

# ──────────────────────────────────────────────────────────────────────────────
# AWS Credentials
# Either provide an existing secret or use IRSA / instance profile (recommended)
# ──────────────────────────────────────────────────────────────────────────────
aws:
  # Name of an existing secret containing AWS credentials.
  # Secret must have keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  # Leave empty to rely on IRSA / instance profile / environment credentials.
  existingSecret: ""

# ──────────────────────────────────────────────────────────────────────────────
# Git credentials for the orchestrator to push generated tools
# ──────────────────────────────────────────────────────────────────────────────
git:
  # Name of an existing secret with key: GIT_TOKEN (for HTTPS) or id_rsa (for SSH)
  existingSecret: ""

# ──────────────────────────────────────────────────────────────────────────────
# Service Account
# ──────────────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}   # use for IRSA: eks.amazonaws.com/role-arn: arn:aws:iam::...
