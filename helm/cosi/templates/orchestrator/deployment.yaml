apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cosi.fullname" . }}-orchestrator
  namespace: {{ include "cosi.namespace" . }}
  labels:
    {{- include "cosi.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      {{- include "cosi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        {{- include "cosi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
      {{- with .Values.orchestrator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "cosi.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cosi.serviceAccountName" . }}
      {{- with .Values.orchestrator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: {{ include "cosi.image" (dict "image" .Values.orchestrator.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          {{- with .Values.orchestrator.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: {{ include "cosi.fullname" . }}-config
          env:
            {{- if .Values.aws.existingSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.existingSecret }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.existingSecret }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- if .Values.git.existingSecret }}
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.existingSecret }}
                  key: GIT_TOKEN
                  optional: true
            {{- end }}
          volumeMounts:
            - name: tools
              mountPath: /app/tools
              readOnly: true
            - name: repo
              mountPath: /app/repo
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
      volumes:
        - name: tools
          persistentVolumeClaim:
            claimName: {{ .Values.orchestrator.toolsPvc.claimName }}
            readOnly: true
        - name: repo
          persistentVolumeClaim:
            claimName: {{ .Values.orchestrator.toolsPvc.claimName }}
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
