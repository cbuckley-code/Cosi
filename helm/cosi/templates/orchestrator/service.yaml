apiVersion: v1
kind: Service
metadata:
  name: {{ include "cosi.fullname" . }}-orchestrator
  namespace: {{ include "cosi.namespace" . }}
  labels:
    {{- include "cosi.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  type: {{ .Values.orchestrator.service.type }}
  ports:
    - port: {{ .Values.orchestrator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cosi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
