version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: cosi-redis
    networks:
      - cosi-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    build:
      context: ./cosi-ui
    container_name: cosi-nginx
    ports:
      - "8443:443"
    networks:
      - cosi-network
    depends_on:
      - orchestrator
      - redis
    restart: unless-stopped

  orchestrator:
    build:
      context: ./cosi-orchestrator
    container_name: cosi-orchestrator
    networks:
      - cosi-network
    volumes:
      - ./tools:/app/tools:ro
      - ./:/app/repo
      - ~/.ssh/id_ed25519_github:/root/.ssh/id_ed25519_github:ro
      - ~/.ssh/id_ed25519_github.pub:/root/.ssh/id_ed25519_github.pub:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_SECRET_PREFIX=${AWS_SECRET_PREFIX:-cosi/}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-20250514-v1:0}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - REDIS_URL=${REDIS_URL:-redis://cosi-redis:6379}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-86400}
      - SESSION_COMPACTION_THRESHOLD=${SESSION_COMPACTION_THRESHOLD:-20}
      - BUILDER_URL=http://cosi-builder:3001
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  builder:
    build:
      context: ./cosi-builder
    container_name: cosi-builder
    networks:
      - cosi-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - ~/.ssh/id_ed25519_github:/root/.ssh/id_ed25519_github:ro
      - ~/.ssh/id_ed25519_github.pub:/root/.ssh/id_ed25519_github.pub:ro
    privileged: true
    environment:
      - POLL_INTERVAL=${POLL_INTERVAL:-5000}
    restart: unless-stopped

networks:
  cosi-network:
    driver: bridge

volumes:
  redis-data:

include:
  - docker-compose.tools.yml
