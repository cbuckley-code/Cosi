apiVersion: v1
kind: Service
metadata:
  name: {{ include "cosi.fullname" . }}-nginx
  namespace: {{ include "cosi.namespace" . }}
  labels:
    {{- include "cosi.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.service.type }}
  ports:
    - port: {{ .Values.nginx.service.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "cosi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
